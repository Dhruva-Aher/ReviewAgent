version: '3.8'

services:
  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - DB_PATH=/app/data/beliefs.db
    volumes:
      - "./data:/app/data" # SQLite persistence
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build: .
    command: python queue_worker.py
    env_file: .env
    environment:
      - DB_PATH=/app/data/beliefs.db
    volumes:
      - "./data:/app/data" # shared SQLite
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
